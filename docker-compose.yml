version: "3.9"

services:
  redis:
    image: redis:latest
    container_name: redis-server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs_local
    restart: unless-stopped

    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console

    environment:
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin

    volumes:
      - rustfs_data:/data

    command: >
      --address :9000
      --console-enable
      /data

volumes:
  redis_data:
  rustfs_data: