<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f7;
            color: #333;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #1a73e8;
        }
        .otp {
            display: inline-block;
            background-color: #1a73e8;
            color: #fff;
            padding: 10px 20px;
            font-size: 24px;
            border-radius: 4px;
            margin: 20px 0;
            letter-spacing: 4px;
        }
        p {
            font-size: 16px;
            line-height: 1.5;
        }
        .footer {
            font-size: 12px;
            color: #888;
            margin-top: 30px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>OTP Verification</h2>
    <p th:text="'Hello, ' + ${name}">Hello, Name</p>
    <p>Use the following One-Time Password (OTP) to complete your verification:</p>
    <div class="otp" th:text="${otpCode}">123456</div>
    <p>This OTP will expire shortly. Please do not share it with anyone.</p>
    <p>Thank you,<br/>Your Company Name</p>
    <div class="footer">
        If you did not request this, please ignore this email.
    </div>
</div>
</body>
</html>
